name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Download sherpa-onnx JARs (macOS only)
        run: |
          SHERPA_VERSION="1.13.1"
          BASE_URL="https://github.com/k2-fsa/sherpa-onnx/releases/download/v${SHERPA_VERSION}"
          mkdir -p macos/libs
          curl -fL "$BASE_URL/sherpa-onnx-v${SHERPA_VERSION}.jar" \
               -o macos/libs/sherpa-onnx.jar
          curl -fL "$BASE_URL/sherpa-onnx-native-lib-osx-aarch64-v${SHERPA_VERSION}.jar" \
               -o "macos/libs/sherpa-onnx-native-lib-osx-aarch64-v${SHERPA_VERSION}.jar"

      - name: Build AVFoundation JNI wrapper
        run: |
          JAVA_HOME=$(java -XshowSettings:all -version 2>&1 | awk '/java.home/{print $3}')
          mkdir -p macos/libs
          MACOS_SDK=$(xcrun --sdk macosx15 --show-sdk-path 2>/dev/null || xcrun --show-sdk-path)
          CXX_INCLUDE="$MACOS_SDK/usr/include/c++/v1"
          clang++ -shared -fPIC -O2 \
            -isysroot "$MACOS_SDK" \
            -I"$CXX_INCLUDE" \
            -framework AVFoundation -framework AudioToolbox -framework Foundation \
            -I"$JAVA_HOME/include" -I"$JAVA_HOME/include/darwin" \
            -o macos/libs/libavfoundation_audio_jni.dylib \
            macos/native/libavfoundation_audio_jni.mm

      - name: Build fat JAR
        run: ./gradlew :macos:macosJar

      - name: Package release zip
        run: |
          VERSION=${GITHUB_REF_NAME}
          DIST=freeman-${VERSION}-macos

          mkdir -p ${DIST}/libs

          cp macos/build/libs/macos-macos.jar   ${DIST}/freeman.jar
          cp config.yaml                        ${DIST}/config.yaml
          cp setup.sh                           ${DIST}/setup.sh
          chmod +x ${DIST}/setup.sh

          # Bundle native dylibs so the JAR can run without a separate install step
          cp macos/libs/libavfoundation_audio_jni.dylib            ${DIST}/libs/
          cp macos/libs/sherpa-onnx-native-lib-osx-aarch64-*.jar   ${DIST}/libs/

          # Bundle setup scripts for model downloads
          cp -r scripts/ ${DIST}/scripts/
          chmod +x ${DIST}/scripts/*.sh

          cat > ${DIST}/run.sh <<'EOF'
#!/bin/bash
DIR="$(cd "$(dirname "$0")" && pwd)"
CONFIG="${1:-$DIR/config.yaml}"
# taskpolicy -b: yield CPU to foreground apps automatically on macOS
exec taskpolicy -b java \
  -Djava.library.path="$DIR/libs" \
  -Xms64m -Xmx1500m \
  -jar "$DIR/freeman.jar" "$CONFIG"
EOF
          chmod +x ${DIST}/run.sh

          zip -r ${DIST}.zip ${DIST}
          echo "ASSET=${DIST}.zip" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
