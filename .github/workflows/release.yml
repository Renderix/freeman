name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Download native libs
        run: ./scripts/setup_kotlin_libs.sh

      - name: Build fat JAR
        run: ./gradlew :macos:macosJar

      - name: Package release zip
        run: |
          VERSION=${GITHUB_REF_NAME}
          DIST=freeman-${VERSION}-macos

          mkdir -p ${DIST}

          cp macos/build/libs/macos-macos.jar ${DIST}/freeman.jar
          cp config.yaml                      ${DIST}/config.yaml

          cat > ${DIST}/run.sh <<'EOF'
          #!/bin/bash
          DIR="$(cd "$(dirname "$0")" && pwd)"
          CONFIG="${1:-$DIR/config.yaml}"
          LIBS=$(grep 'libsPath:' "$CONFIG" | sed 's/.*libsPath: *//' | tr -d '"' | xargs)
          if [ -z "$LIBS" ]; then
            echo "[Freeman] libsPath not set in $CONFIG — set it to your sherpa-onnx libs directory"
            exit 1
          fi
          java -Djava.library.path="$LIBS" -jar "$DIR/freeman.jar" "$CONFIG"
          EOF
          chmod +x ${DIST}/run.sh

          zip -r ${DIST}.zip ${DIST}
          echo "ASSET=${DIST}.zip" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
