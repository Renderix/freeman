name: Release Freeman Binaries

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
        include:
          - os: macos-latest
            artifact_name: freeman-darwin-arm64
          - os: ubuntu-latest
            artifact_name: freeman-linux-x64
          - os: windows-latest
            artifact_name: freeman-windows-x64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install nuitka zstandard

      - name: Cache Kokoro Voices
        run: |
          # Ensure at least one voice is cached for bundling
          export PYTHONPATH=$PYTHONPATH:$(pwd)/src
          python3 scripts/bundle_voices.py

      - name: Build with Nuitka
        run: python3 build.py

      - name: Rename binary for platform
        shell: bash
        run: |
          mkdir -p bin
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            mv dist/freeman.exe bin/${{ matrix.artifact_name }}
          else
            mv dist/freeman bin/${{ matrix.artifact_name }}
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: bin/${{ matrix.artifact_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          body: |
            Freeman Streaming TTS Server Release

            - High-performance Kokoro-82M engine
            - Real-time WebSocket streaming
            - Single-file standalone binaries
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
