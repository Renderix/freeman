<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Freeman Logs</title>
<style>
  :root {
    --bg: #0f1113;
    --panel: #181b1f;
    --panel-2: #20252b;
    --border: #2a2f36;
    --text: #e7ebef;
    --text-dim: #9aa3ad;
    --accent: #7aa2f7;
    --user: #74c7ec;
    --assistant: #c4a7e7;
    --filler: #5f6773;
    --tool: #94e2d5;
    --danger: #f38ba8;
    --warn: #fab387;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    font-size: 13px; line-height: 1.45;
  }
  header {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    display: flex; gap: 12px; align-items: center;
    position: sticky; top: 0; z-index: 10;
  }
  header h1 {
    margin: 0; font-size: 14px; font-weight: 600; letter-spacing: 0.02em;
    color: var(--text-dim); text-transform: uppercase;
  }
  select {
    background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 4px;
    padding: 4px 8px; font-size: 13px; font-family: inherit;
    min-width: 280px;
  }
  .meta { color: var(--text-dim); font-size: 12px; }
  main { padding: 16px; max-width: 900px; margin: 0 auto; }

  /* Gantt strip */
  .gantt {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    margin-bottom: 20px;
    font-size: 11px;
  }
  .gantt-row { display: flex; align-items: center; height: 18px; margin: 2px 0; }
  .gantt-label { width: 60px; color: var(--text-dim); flex-shrink: 0; }
  .gantt-track {
    position: relative; flex: 1; height: 12px;
    background: #15181c; border-radius: 2px;
  }
  .gantt-bar { position: absolute; height: 100%; border-radius: 2px; }
  .gantt-bar.heard   { background: var(--user); }
  .gantt-bar.speak   { background: var(--assistant); }
  .gantt-bar.filler  { background: var(--filler); }
  .gantt-bar.tool    { background: var(--tool); }
  .gantt-bar.wake    { background: var(--warn); width: 2px !important; }

  /* Turn rendering */
  .startup, .shutdown {
    margin-bottom: 16px; padding: 8px 12px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 6px; font-size: 11px; color: var(--text-dim);
  }
  .startup h3, .shutdown h3 {
    margin: 0 0 4px 0; font-size: 11px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
  }

  .turn { margin: 18px 0; }
  .bubble {
    padding: 8px 12px; border-radius: 10px;
    max-width: 640px;
  }
  .bubble.user {
    background: #1b2838; border: 1px solid #2a4460;
    color: var(--user);
    margin-left: auto;
  }
  .bubble.user::before { content: "🎤 "; opacity: 0.8; }
  .bubble.assistant {
    background: #241f2e; border: 1px solid #3a2f4a;
    color: var(--assistant);
  }
  .bubble.assistant::before { content: "🔊 "; opacity: 0.8; }
  .bubble.filler {
    background: transparent; border: 1px dashed var(--border);
    color: var(--filler); font-style: italic;
    font-size: 12px; padding: 4px 10px;
  }
  .bubble.filler::before { content: "💬 "; opacity: 0.6; }

  .chip {
    display: inline-block; padding: 2px 8px; border-radius: 10px;
    font-size: 11px; color: var(--text-dim);
    background: var(--panel-2); border: 1px solid var(--border);
    margin: 6px 0;
  }
  .chip.red { color: var(--danger); border-color: #5a2838; background: #2a1018; }
  .chip.ok  { color: var(--tool);   border-color: #2d4641; background: #0e2421; }

  .tool {
    margin: 6px 0; padding: 6px 10px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 6px; font-size: 12px;
  }
  .tool summary {
    cursor: pointer; outline: none;
    color: var(--tool);
  }
  .tool summary::before { content: "🔧 "; opacity: 0.7; }
  .tool summary:hover { color: #fff; }
  .tool .kv {
    display: grid; grid-template-columns: 70px 1fr; gap: 4px 10px;
    margin-top: 6px; padding-top: 6px;
    border-top: 1px dashed var(--border);
    color: var(--text-dim);
  }
  .tool .kv pre {
    margin: 0; white-space: pre-wrap; word-break: break-word;
    background: #0c0e10; padding: 6px 8px; border-radius: 4px;
    color: var(--text); font-size: 11px;
    max-height: 300px; overflow: auto;
  }
  .tool .fail { color: var(--danger); }

  .turn-head {
    display: flex; gap: 8px; align-items: baseline;
    color: var(--text-dim); font-size: 11px;
    margin-bottom: 6px;
  }
  .turn-head strong { color: var(--text); font-weight: 600; }

  footer { padding: 20px; text-align: center; color: var(--text-dim); font-size: 11px; }

  .empty {
    padding: 40px; text-align: center; color: var(--text-dim);
  }
</style>
</head>
<body>

<header>
  <h1>Freeman&nbsp;Logs</h1>
  <select id="session-picker"><option value="">loading…</option></select>
  <span id="session-meta" class="meta"></span>
</header>

<main id="app">
  <div class="empty">Pick a session from the dropdown above.</div>
</main>

<footer>Local viewer — no network traffic.</footer>

<script>
const picker = document.getElementById('session-picker');
const meta = document.getElementById('session-meta');
const app = document.getElementById('app');

async function loadSessions() {
  const res = await fetch('/api/sessions');
  const list = await res.json();
  picker.innerHTML = '';
  if (!list || list.length === 0) {
    picker.innerHTML = '<option value="">no logs found</option>';
    return;
  }
  // Group by date for nicer <optgroup>.
  const byDate = {};
  for (const s of list) {
    (byDate[s.date] ||= []).push(s);
  }
  const dates = Object.keys(byDate).sort().reverse();
  for (const d of dates) {
    const og = document.createElement('optgroup');
    og.label = d;
    for (const s of byDate[d]) {
      const o = document.createElement('option');
      o.value = s.path;
      o.textContent = s.filename;
      og.appendChild(o);
    }
    picker.appendChild(og);
  }
  // Auto-load most recent.
  picker.value = list[0].path;
  await loadSession(list[0].path);
}

picker.addEventListener('change', () => {
  if (picker.value) loadSession(picker.value);
});

async function loadSession(path) {
  app.innerHTML = '<div class="empty">loading…</div>';
  try {
    const res = await fetch('/api/session?path=' + encodeURIComponent(path));
    if (!res.ok) throw new Error(await res.text());
    const s = await res.json();
    render(s);
  } catch (e) {
    app.innerHTML = '<div class="empty">error: ' + escapeHTML(String(e)) + '</div>';
  }
}

function render(s) {
  const durSec = (s.duration_ms / 1000).toFixed(1);
  meta.textContent = `${s.turn_count} turns · ${s.tool_call_count} tool calls · ${durSec}s`;

  const parts = [];
  parts.push(renderGantt(s));
  if (s.startup && s.startup.length) {
    parts.push(renderSegment('Startup', s.startup));
  }
  (s.turns || []).forEach(t => parts.push(renderTurn(t)));
  if (s.shutdown && s.shutdown.length) {
    parts.push(renderSegment('Shutdown', s.shutdown));
  }
  app.innerHTML = parts.join('');
}

function renderGantt(s) {
  if (!s.turns || s.turns.length === 0) return '';
  const start = new Date(s.start_time).getTime();
  const end = new Date(s.end_time).getTime();
  const span = Math.max(1, end - start);
  const pct = t => ((new Date(t).getTime() - start) / span * 100).toFixed(3);
  const bar = (klass, t0, t1, title) => {
    const a = pct(t0); const b = pct(t1 || t0);
    const width = Math.max(0.3, Number(b) - Number(a));
    return `<div class="gantt-bar ${klass}" style="left:${a}%;width:${width}%" title="${escapeHTML(title)}"></div>`;
  };

  const rows = { heard: [], speak: [], filler: [], tool: [], wake: [] };

  for (const t of s.turns) {
    rows.heard.push(bar('heard', t.start_time, t.start_time, 'heard: ' + t.heard_text));
    for (const line of (t.assistant_lines || [])) {
      const klass = line.is_filler ? 'filler' : 'speak';
      // Estimate speak duration from text length (~80 chars/sec for voice).
      const dur = Math.max(250, (line.text.length / 80) * 1000);
      const endT = new Date(new Date(line.time).getTime() + dur).toISOString();
      rows[klass].push(bar(klass, line.time, endT, (line.is_filler?'[filler] ':'') + line.text));
    }
    for (const tc of (t.tools || [])) {
      rows.tool.push(bar('tool', tc.called_at, tc.result_at || tc.called_at, `${tc.name} (${tc.duration_ms}ms)`));
    }
  }
  for (const w of (s.wake_events || [])) {
    rows.wake.push(bar('wake', w.time, w.time, `${w.keyword} ${w.score}`));
  }
  const mk = (label, arr) =>
    `<div class="gantt-row"><div class="gantt-label">${label}</div><div class="gantt-track">${arr.join('')}</div></div>`;
  return `<div class="gantt">${mk('heard', rows.heard)}${mk('speak', rows.speak)}${mk('filler', rows.filler)}${mk('tool', rows.tool)}${mk('wake', rows.wake)}</div>`;
}

function renderTurn(t) {
  const head = `<div class="turn-head"><strong>Turn ${t.index}</strong> · ${fmtTime(t.start_time)} · ${ (t.total_ms/1000).toFixed(1) }s total</div>`;
  const user = `<div class="bubble user">${escapeHTML(t.heard_text)}</div>`;
  const deadAirClass = t.dead_air_ms > 2500 ? 'red' : '';
  const deadAir = t.dead_air_ms > 0
    ? `<div class="chip ${deadAirClass}">⏱ ${t.dead_air_ms} ms dead air</div>`
    : '';

  // Interleave speaking lines and tool calls in timestamp order so the
  // narrative reads naturally.
  const items = [];
  (t.assistant_lines || []).forEach(l => items.push({ time: l.time, render: () => renderLine(l) }));
  (t.tools || []).forEach(tc => items.push({ time: tc.called_at, render: () => renderTool(tc) }));
  items.sort((a, b) => new Date(a.time) - new Date(b.time));
  const body = items.map(i => i.render()).join('');

  return `<div class="turn">${head}${user}${deadAir}${body}</div>`;
}

function renderLine(line) {
  const klass = line.is_filler ? 'filler' : 'assistant';
  return `<div class="bubble ${klass}">${escapeHTML(line.text)}</div>`;
}

function renderTool(tc) {
  const okChip = tc.ok
    ? `<span class="chip ok">${tc.duration_ms}ms</span>`
    : `<span class="chip red">failed · ${tc.duration_ms}ms</span>`;
  const args = tryPrettyJSON(tc.args);
  const out = tc.ok
    ? `<pre>${escapeHTML(tc.output || '(empty)')}</pre>`
    : `<pre class="fail">${escapeHTML(tc.error || tc.output || '(no error)')}</pre>`;
  return `
    <details class="tool">
      <summary>${escapeHTML(tc.name)} ${okChip}</summary>
      <div class="kv">
        <div>args</div><pre>${escapeHTML(args)}</pre>
        <div>output</div>${out}
      </div>
    </details>`;
}

function renderSegment(title, events) {
  const rows = events.map(e => {
    const fields = e.fields ? Object.entries(e.fields).map(([k,v]) => `${k}=${v}`).join(' ') : '';
    return `<div>${fmtTime(e.time)} · <strong>${escapeHTML(e.msg)}</strong>${fields ? ' · ' + escapeHTML(fields) : ''}</div>`;
  }).join('');
  return `<div class="startup"><h3>${title}</h3>${rows}</div>`;
}

function fmtTime(iso) {
  const d = new Date(iso);
  return d.toLocaleTimeString('en-GB', { hour12: false }) + '.' + String(d.getMilliseconds()).padStart(3, '0');
}

function tryPrettyJSON(s) {
  if (!s) return '';
  try {
    return JSON.stringify(JSON.parse(s), null, 2);
  } catch {
    return s;
  }
}

function escapeHTML(s) {
  return String(s)
    .replaceAll('&', '&amp;').replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;').replaceAll('"', '&quot;');
}

loadSessions();
</script>
</body>
</html>
