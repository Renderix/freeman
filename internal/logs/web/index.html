<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Freeman Logs</title>
<style>
  :root {
    --bg:       #111315;
    --panel:    #171a1d;
    --panel-2:  #1d2024;
    --border:   #24282d;
    --text:     #e4e6e8;
    --text-dim: #8a9098;
    --accent:   #8fb8ff;
    --ok:       #6fd19a;
    --bad:      #e06c75;
    --hl:       #eaeaea;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    font-size: 13px; line-height: 1.55;
  }
  header {
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    display: flex; gap: 14px; align-items: center;
    position: sticky; top: 0; z-index: 10;
  }
  header .brand {
    font-size: 12px; font-weight: 600; letter-spacing: 0.08em;
    color: var(--text-dim); text-transform: uppercase;
    padding-right: 8px; border-right: 1px solid var(--border);
    margin-right: 4px;
  }
  header label { color: var(--text-dim); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; }
  select {
    background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 4px;
    padding: 4px 8px; font-size: 12px; font-family: inherit;
  }
  select:focus { outline: 1px solid var(--accent); outline-offset: 1px; }
  #date-picker    { min-width: 140px; }
  #session-picker { min-width: 240px; }
  .meta { margin-left: auto; color: var(--text-dim); font-size: 12px; }

  main { padding: 20px 24px; max-width: 860px; margin: 0 auto; }

  /* Gantt strip — subtle, no colors fighting the text. */
  .gantt {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 12px;
    margin-bottom: 22px;
    font-size: 11px;
  }
  .gantt-row { display: flex; align-items: center; height: 16px; margin: 1px 0; }
  .gantt-label { width: 56px; color: var(--text-dim); flex-shrink: 0; letter-spacing: 0.02em; }
  .gantt-track {
    position: relative; flex: 1; height: 10px;
    background: #0e1012; border-radius: 2px;
  }
  .gantt-bar { position: absolute; height: 100%; border-radius: 1px; }
  .gantt-bar.heard   { background: #4a5562; }
  .gantt-bar.speak   { background: #8a9098; }
  .gantt-bar.filler  { background: #343a42; }
  .gantt-bar.tool    { background: #6b7582; }
  .gantt-bar.wake    { background: var(--accent); width: 2px !important; }

  /* Startup/shutdown blocks — compact, quiet. */
  .startup, .shutdown {
    margin-bottom: 18px; padding: 10px 14px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 4px; font-size: 11px; color: var(--text-dim);
    font-family: "SF Mono", Menlo, Consolas, monospace;
  }
  .startup h3, .shutdown h3 {
    margin: 0 0 6px 0; font-size: 10px; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  }

  /* Turn block — minimal, typography-driven. */
  .turn {
    margin: 24px 0;
    padding-top: 18px;
    border-top: 1px solid var(--border);
  }
  .turn-head {
    display: flex; gap: 10px; align-items: baseline;
    color: var(--text-dim); font-size: 11px;
    margin-bottom: 10px;
    letter-spacing: 0.02em;
  }
  .turn-head strong { color: var(--text); font-weight: 600; }

  /* Bubbles: no coloured backgrounds — just a narrow left accent. */
  .line {
    padding: 4px 0 4px 14px;
    border-left: 2px solid var(--border);
    margin: 4px 0;
    max-width: 700px;
  }
  .line.user {
    border-left-color: var(--hl);
    color: var(--hl);
    font-weight: 500;
  }
  .line.user::before {
    content: "You";
    display: inline-block; width: 48px;
    font-size: 10px; color: var(--text-dim); text-transform: uppercase;
    letter-spacing: 0.1em; vertical-align: middle;
    margin-right: 8px;
  }
  .line.assistant { border-left-color: var(--accent); }
  .line.assistant::before {
    content: "Horus";
    display: inline-block; width: 48px;
    font-size: 10px; color: var(--text-dim); text-transform: uppercase;
    letter-spacing: 0.1em; vertical-align: middle;
    margin-right: 8px;
  }
  .line.filler {
    border-left-color: var(--border);
    color: var(--text-dim);
    font-style: italic;
  }
  .line.filler::before {
    content: "(filler)";
    display: inline-block; width: 48px;
    font-size: 10px; color: var(--text-dim); text-transform: none;
    letter-spacing: 0;
    margin-right: 8px;
  }

  /* Timing chips — the one place colour carries meaning. */
  .chip {
    display: inline-block; padding: 1px 7px; border-radius: 2px;
    font-size: 10px; letter-spacing: 0.04em;
    font-family: "SF Mono", Menlo, Consolas, monospace;
    color: var(--text-dim);
    background: transparent; border: 1px solid var(--border);
    margin: 2px 0 2px 56px;
  }
  .chip.bad { color: var(--bad); border-color: rgba(224,108,117,0.4); }
  .chip.ok  { color: var(--ok);  border-color: rgba(111,209,154,0.4); }

  /* Tool rows — same left-accent treatment, expandable. */
  .tool {
    margin: 4px 0 4px 56px;
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: 3px;
    font-size: 12px;
    background: var(--panel);
  }
  .tool summary {
    cursor: pointer; outline: none;
    color: var(--text);
    font-family: "SF Mono", Menlo, Consolas, monospace;
    font-size: 11px;
  }
  .tool summary::marker { color: var(--text-dim); }
  .tool summary:hover { color: var(--accent); }
  .tool .kv {
    display: grid; grid-template-columns: 64px 1fr; gap: 4px 12px;
    margin-top: 8px; padding-top: 8px;
    border-top: 1px dashed var(--border);
    color: var(--text-dim);
  }
  .tool .kv pre {
    margin: 0; white-space: pre-wrap; word-break: break-word;
    background: #0d0f11; padding: 8px 10px; border-radius: 3px;
    color: var(--text); font-size: 11px;
    font-family: "SF Mono", Menlo, Consolas, monospace;
    max-height: 320px; overflow: auto;
    border: 1px solid #1a1d20;
  }
  .tool .fail { color: var(--bad); }

  footer { padding: 28px; text-align: center; color: var(--text-dim); font-size: 10px;
           letter-spacing: 0.1em; text-transform: uppercase; }

  .empty { padding: 56px; text-align: center; color: var(--text-dim); }
</style>
</head>
<body>

<header>
  <span class="brand">Freeman Logs</span>
  <label for="date-picker">Date</label>
  <select id="date-picker"><option value="">—</option></select>
  <label for="session-picker">Session</label>
  <select id="session-picker"><option value="">—</option></select>
  <span id="session-meta" class="meta"></span>
</header>

<main id="app">
  <div class="empty">Pick a session to begin.</div>
</main>

<footer>local · no network</footer>

<script>
const datePicker = document.getElementById('date-picker');
const picker = document.getElementById('session-picker');
const meta = document.getElementById('session-meta');
const app = document.getElementById('app');

// Keyed by date → array of sessions.
let sessionsByDate = {};

async function loadSessions() {
  const res = await fetch('/api/sessions');
  const list = await res.json();
  if (!list || list.length === 0) {
    datePicker.innerHTML = '<option value="">no logs</option>';
    picker.innerHTML = '<option value="">no logs</option>';
    return;
  }
  sessionsByDate = {};
  for (const s of list) (sessionsByDate[s.date] ||= []).push(s);
  const dates = Object.keys(sessionsByDate).sort().reverse();
  datePicker.innerHTML = dates.map(d => `<option value="${d}">${d}</option>`).join('');
  datePicker.value = dates[0];
  populateSessions(dates[0]);
  // Auto-load most recent session.
  if (picker.value) await loadSession(picker.value);
}

function populateSessions(date) {
  const sessions = sessionsByDate[date] || [];
  picker.innerHTML = sessions
    .map(s => `<option value="${s.path}">${s.filename}</option>`)
    .join('');
  if (sessions.length > 0) picker.value = sessions[0].path;
}

datePicker.addEventListener('change', () => {
  populateSessions(datePicker.value);
  if (picker.value) loadSession(picker.value);
});

picker.addEventListener('change', () => {
  if (picker.value) loadSession(picker.value);
});

async function loadSession(path) {
  app.innerHTML = '<div class="empty">loading…</div>';
  try {
    const res = await fetch('/api/session?path=' + encodeURIComponent(path));
    if (!res.ok) throw new Error(await res.text());
    const s = await res.json();
    render(s);
  } catch (e) {
    app.innerHTML = '<div class="empty">error: ' + escapeHTML(String(e)) + '</div>';
  }
}

function render(s) {
  const durSec = (s.duration_ms / 1000).toFixed(1);
  meta.textContent = `${s.turn_count} turns · ${s.tool_call_count} tool calls · ${durSec}s`;

  const parts = [];
  parts.push(renderGantt(s));
  if (s.startup && s.startup.length) parts.push(renderSegment('Startup', s.startup));
  (s.turns || []).forEach(t => parts.push(renderTurn(t)));
  if (s.shutdown && s.shutdown.length) parts.push(renderSegment('Shutdown', s.shutdown));
  app.innerHTML = parts.join('');
}

function renderGantt(s) {
  if (!s.turns || s.turns.length === 0) return '';
  const start = new Date(s.start_time).getTime();
  const end = new Date(s.end_time).getTime();
  const span = Math.max(1, end - start);
  const pct = t => ((new Date(t).getTime() - start) / span * 100).toFixed(3);
  const bar = (klass, t0, t1, title) => {
    const a = pct(t0); const b = pct(t1 || t0);
    const width = Math.max(0.3, Number(b) - Number(a));
    return `<div class="gantt-bar ${klass}" style="left:${a}%;width:${width}%" title="${escapeHTML(title)}"></div>`;
  };
  const rows = { heard: [], speak: [], filler: [], tool: [], wake: [] };
  for (const t of s.turns) {
    rows.heard.push(bar('heard', t.start_time, t.start_time, 'heard: ' + t.heard_text));
    for (const line of (t.assistant_lines || [])) {
      const klass = line.is_filler ? 'filler' : 'speak';
      const dur = Math.max(250, (line.text.length / 80) * 1000);
      const endT = new Date(new Date(line.time).getTime() + dur).toISOString();
      rows[klass].push(bar(klass, line.time, endT, (line.is_filler?'[filler] ':'') + line.text));
    }
    for (const tc of (t.tools || [])) {
      rows.tool.push(bar('tool', tc.called_at, tc.result_at || tc.called_at, `${tc.name} (${tc.duration_ms}ms)`));
    }
  }
  for (const w of (s.wake_events || [])) {
    rows.wake.push(bar('wake', w.time, w.time, `${w.keyword} ${w.score}`));
  }
  const mk = (label, arr) =>
    `<div class="gantt-row"><div class="gantt-label">${label}</div><div class="gantt-track">${arr.join('')}</div></div>`;
  return `<div class="gantt">${mk('heard', rows.heard)}${mk('speak', rows.speak)}${mk('filler', rows.filler)}${mk('tool', rows.tool)}${mk('wake', rows.wake)}</div>`;
}

function renderTurn(t) {
  const head = `<div class="turn-head"><strong>Turn ${t.index}</strong> · ${fmtTime(t.start_time)} · ${ (t.total_ms/1000).toFixed(1) }s total</div>`;
  const user = `<div class="line user">${escapeHTML(t.heard_text)}</div>`;
  const deadAirClass = t.dead_air_ms > 2500 ? 'bad' : '';
  const deadAir = t.dead_air_ms > 0
    ? `<div class="chip ${deadAirClass}">${t.dead_air_ms} ms to first audio</div>`
    : '';
  const items = [];
  (t.assistant_lines || []).forEach(l => items.push({ time: l.time, render: () => renderLine(l) }));
  (t.tools || []).forEach(tc => items.push({ time: tc.called_at, render: () => renderTool(tc) }));
  items.sort((a, b) => new Date(a.time) - new Date(b.time));
  const body = items.map(i => i.render()).join('');
  return `<div class="turn">${head}${user}${deadAir}${body}</div>`;
}

function renderLine(line) {
  const klass = line.is_filler ? 'filler' : 'assistant';
  return `<div class="line ${klass}">${escapeHTML(line.text)}</div>`;
}

function renderTool(tc) {
  const chip = tc.ok
    ? `<span class="chip ok">${tc.duration_ms}ms</span>`
    : `<span class="chip bad">failed · ${tc.duration_ms}ms</span>`;
  const args = tryPrettyJSON(tc.args);
  const out = tc.ok
    ? `<pre>${escapeHTML(tc.output || '(empty)')}</pre>`
    : `<pre class="fail">${escapeHTML(tc.error || tc.output || '(no error)')}</pre>`;
  return `
    <details class="tool">
      <summary>${escapeHTML(tc.name)} ${chip}</summary>
      <div class="kv">
        <div>args</div><pre>${escapeHTML(args)}</pre>
        <div>output</div>${out}
      </div>
    </details>`;
}

function renderSegment(title, events) {
  const rows = events.map(e => {
    const fields = e.fields ? Object.entries(e.fields).map(([k,v]) => `${k}=${v}`).join(' ') : '';
    return `<div>${fmtTime(e.time)} · ${escapeHTML(e.msg)}${fields ? ' · ' + escapeHTML(fields) : ''}</div>`;
  }).join('');
  return `<div class="startup"><h3>${title}</h3>${rows}</div>`;
}

function fmtTime(iso) {
  const d = new Date(iso);
  return d.toLocaleTimeString('en-GB', { hour12: false }) + '.' + String(d.getMilliseconds()).padStart(3, '0');
}

function tryPrettyJSON(s) {
  if (!s) return '';
  try { return JSON.stringify(JSON.parse(s), null, 2); } catch { return s; }
}

function escapeHTML(s) {
  return String(s).replaceAll('&', '&amp;').replaceAll('<', '&lt;')
                  .replaceAll('>', '&gt;').replaceAll('"', '&quot;');
}

loadSessions();
</script>
</body>
</html>
