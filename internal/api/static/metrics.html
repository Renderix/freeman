<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metrics - Freeman TTS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .content {
            padding: 30px;
        }

        .metric-section {
            margin-bottom: 25px;
        }

        .metric-section h2 {
            font-size: 1.1rem;
            color: #667eea;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 2px solid #e0e0e0;
        }

        .metric-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .metric-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
        }

        .metric-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #333;
            font-family: monospace;
        }

        .metric-label {
            font-size: 0.85rem;
            color: #666;
            margin-top: 5px;
        }

        .metric-unit {
            font-size: 0.9rem;
            color: #999;
            font-weight: normal;
        }

        .status-ok {
            color: #2ed573;
        }

        .refresh-info {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
            color: #999;
        }

        .nav-link {
            display: inline-block;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .nav-link:hover {
            text-decoration: underline;
        }

        .json-link {
            float: right;
            font-size: 0.85rem;
            color: #667eea;
            text-decoration: none;
        }

        .json-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Server Metrics</h1>
            <p>Real-time performance monitoring</p>
        </div>

        <div class="content">
            <a href="/api/metrics" class="json-link">View JSON</a>

            <div class="metric-section">
                <h2>Memory</h2>
                <div class="metric-grid">
                    <div class="metric-card">
                        <div class="metric-value" id="allocMb">--</div>
                        <div class="metric-label">Allocated <span class="metric-unit">MB</span></div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value" id="sysMb">--</div>
                        <div class="metric-label">System <span class="metric-unit">MB</span></div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value" id="heapMb">--</div>
                        <div class="metric-label">Heap <span class="metric-unit">MB</span></div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value" id="heapObjects">--</div>
                        <div class="metric-label">Heap Objects</div>
                    </div>
                </div>
            </div>

            <div class="metric-section">
                <h2>Runtime</h2>
                <div class="metric-grid">
                    <div class="metric-card">
                        <div class="metric-value" id="goroutines">--</div>
                        <div class="metric-label">Goroutines</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value" id="numCpu">--</div>
                        <div class="metric-label">CPUs</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value" id="uptime">--</div>
                        <div class="metric-label">Uptime</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value" id="goVersion">--</div>
                        <div class="metric-label">Go Version</div>
                    </div>
                </div>
            </div>

            <div class="metric-section">
                <h2>Server</h2>
                <div class="metric-grid">
                    <div class="metric-card">
                        <div class="metric-value" id="activeSessions">--</div>
                        <div class="metric-label">Active Sessions</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value status-ok" id="engineStatus">--</div>
                        <div class="metric-label">Engine Status</div>
                    </div>
                </div>
            </div>

            <div class="refresh-info">Auto-refreshes every 2 seconds</div>

            <a href="/" class="nav-link">← Back to TTS</a>
        </div>
    </div>

    <script>
        async function fetchMetrics() {
            try {
                const response = await fetch('/api/metrics');
                const data = await response.json();

                // Memory
                document.getElementById('allocMb').textContent = data.memory.alloc_mb.toFixed(1);
                document.getElementById('sysMb').textContent = data.memory.sys_mb.toFixed(1);
                document.getElementById('heapMb').textContent = data.memory.heap_inuse_mb.toFixed(1);
                document.getElementById('heapObjects').textContent = formatNumber(data.memory.heap_objects);

                // Runtime
                document.getElementById('goroutines').textContent = data.runtime.goroutines;
                document.getElementById('numCpu').textContent = data.runtime.num_cpu;
                document.getElementById('uptime').textContent = data.runtime.uptime_human;
                document.getElementById('goVersion').textContent = data.runtime.go_version.replace('go', '');

                // Server
                document.getElementById('activeSessions').textContent = data.server.active_sessions;
                document.getElementById('engineStatus').textContent = data.server.engine_loaded ? 'OK' : 'Error';
                document.getElementById('engineStatus').className = data.server.engine_loaded ? 'metric-value status-ok' : 'metric-value';

            } catch (error) {
                console.error('Failed to fetch metrics:', error);
            }
        }

        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }

        // Initial fetch and auto-refresh
        fetchMetrics();
        setInterval(fetchMetrics, 2000);
    </script>
</body>
</html>
