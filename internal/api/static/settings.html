<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Freeman TTS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 0.9rem;
        }

        .content {
            padding: 30px;
        }

        .setting-group {
            margin-bottom: 25px;
        }

        .setting-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 1rem;
        }

        .setting-group .description {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 10px;
        }

        select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            background: white;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        select:focus {
            outline: none;
            border-color: #667eea;
        }

        .speed-input {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        input[type="range"] {
            flex: 1;
            height: 8px;
            border-radius: 4px;
            background: #e0e0e0;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
        }

        .speed-value {
            min-width: 50px;
            text-align: center;
            font-weight: 600;
            color: #667eea;
            font-size: 1.1rem;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 15px 25px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-save {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-back {
            background: #f1f2f6;
            color: #333;
        }

        .btn-back:hover {
            background: #dfe4ea;
        }

        .message {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        .config-path {
            margin-top: 30px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            font-size: 0.85rem;
            color: #666;
        }

        .config-path code {
            background: #e9ecef;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
        }

        .nav-link {
            display: inline-block;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .nav-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Settings</h1>
            <p>Configure default voice and speed preferences</p>
        </div>

        <div class="content">
            <div class="message" id="message"></div>

            <div class="setting-group">
                <label for="voiceSelect">Default Voice</label>
                <p class="description">This voice will be used by default for all TTS requests</p>
                <select id="voiceSelect">
                    <optgroup label="American Female">
                        <option value="af_heart">Heart (warm, expressive)</option>
                        <option value="af_alloy">Alloy (professional)</option>
                        <option value="af_aoede">Aoede (soft)</option>
                        <option value="af_bella">Bella (calm)</option>
                        <option value="af_jessica">Jessica (friendly)</option>
                        <option value="af_kore">Kore (young)</option>
                        <option value="af_nicole">Nicole (mature)</option>
                        <option value="af_nova">Nova (energetic)</option>
                        <option value="af_river">River (smooth)</option>
                        <option value="af_sarah">Sarah (neutral)</option>
                        <option value="af_sky">Sky (airy)</option>
                    </optgroup>
                    <optgroup label="American Male">
                        <option value="am_adam">Adam (natural)</option>
                        <option value="am_echo">Echo (deep)</option>
                        <option value="am_eric">Eric (clear)</option>
                        <option value="am_fenrir">Fenrir (strong)</option>
                        <option value="am_liam">Liam (friendly)</option>
                        <option value="am_michael">Michael (authoritative)</option>
                        <option value="am_onyx">Onyx (deep)</option>
                        <option value="am_puck">Puck (youthful)</option>
                    </optgroup>
                    <optgroup label="British Female">
                        <option value="bf_alice">Alice (refined)</option>
                        <option value="bf_emma">Emma (warm)</option>
                        <option value="bf_isabella">Isabella (soft)</option>
                        <option value="bf_lily">Lily (bright)</option>
                    </optgroup>
                    <optgroup label="British Male">
                        <option value="bm_daniel">Daniel (clear)</option>
                        <option value="bm_fable">Fable (storyteller)</option>
                        <option value="bm_george">George (classic)</option>
                        <option value="bm_lewis">Lewis (smooth)</option>
                    </optgroup>
                </select>
            </div>

            <div class="setting-group">
                <label for="speedRange">Default Speed</label>
                <p class="description">Playback speed from 0.5x (slow) to 2.0x (fast)</p>
                <div class="speed-input">
                    <input type="range" id="speedRange" min="0.5" max="2.0" step="0.1" value="1.0">
                    <span class="speed-value" id="speedValue">1.0x</span>
                </div>
            </div>

            <div class="button-group">
                <button class="btn-back" onclick="window.location.href='/'">Back</button>
                <button class="btn-save" onclick="saveSettings()">Save Settings</button>
            </div>

            <div class="config-path">
                Settings are stored in <code>~/.config/freeman/settings.json</code>
            </div>

            <a href="/" class="nav-link">← Back to TTS</a>
        </div>
    </div>

    <script>
        const voiceSelect = document.getElementById('voiceSelect');
        const speedRange = document.getElementById('speedRange');
        const speedValue = document.getElementById('speedValue');
        const message = document.getElementById('message');

        // Update speed display
        speedRange.addEventListener('input', (e) => {
            speedValue.textContent = e.target.value + 'x';
        });

        // Load current settings
        async function loadSettings() {
            try {
                const response = await fetch('/api/settings');
                const settings = await response.json();

                voiceSelect.value = settings.voice || 'af_heart';
                speedRange.value = settings.speed || 1.0;
                speedValue.textContent = speedRange.value + 'x';
            } catch (error) {
                showMessage('Failed to load settings', 'error');
            }
        }

        // Save settings
        async function saveSettings() {
            const settings = {
                voice: voiceSelect.value,
                speed: parseFloat(speedRange.value)
            };

            try {
                const response = await fetch('/api/settings', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(settings)
                });

                if (response.ok) {
                    showMessage('Settings saved successfully!', 'success');
                } else {
                    showMessage('Failed to save settings', 'error');
                }
            } catch (error) {
                showMessage('Failed to save settings', 'error');
            }
        }

        function showMessage(text, type) {
            message.textContent = text;
            message.className = 'message ' + type;

            setTimeout(() => {
                message.className = 'message';
            }, 3000);
        }

        // Load settings on page load
        loadSettings();
    </script>
</body>
</html>
