server:
  port: 17000

model:
  dir: "./models"
  model_file: "model.onnx"
  voices_file: "voices.bin"
  tokens_file: "tokens.txt"
  data_dir: "espeak-ng-data"

tts:
  default_voice: "af_heart"
  default_speed: 1.0
  max_sentence_chars: 150
  partial_sentence_timeout_sec: 2.0

freeman:
  pm:
    model: claude-haiku-4-5
    confidence_threshold: 0.8
    api_key_env: ANTHROPIC_API_KEY
  worker:
    default_model: claude-sonnet-4-6
    opus_model: claude-opus-4-6
    auth: subscription
  audio:
    input_device: ""
    output_device: ""
  stt:
    model: whisper-large-v3-turbo
    server_path: ""
    server_port: 0
    model_path: ./models/whisper/ggml-large-v3-turbo.bin
    startup_timeout_ms: 10000
    vad:
      silence_ms: 800
      min_speech_ms: 300
      hangover_ms: 500
      aggressiveness: 2
  logging:
    transcript_dir: ./.freeman/transcripts

persona:
  name: "Horus"
  greeting: "I'm here"
  traits:
    - "concise"
    - "technical"
  rules:
    - "No markdown in responses"
    - "No bullet points"
    - "No code fences"
    - "Keep responses under 3 sentences"
  access_key_env: PICOVOICE_ACCESS_KEY
  keyword_paths:
    wake: "./models/wakeword/horus.ppn"
    mute: "./models/wakeword/mute.ppn"
    stop: "./models/wakeword/horus-stop.ppn"
  sensitivities:
    wake: 0.5
    mute: 0.5
    stop: 0.7
