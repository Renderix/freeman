persona:
  name: Freeman
  greeting: "Hey, I'm Freeman. What can I do for you?"
  farewell: "Catch you later."
  rules: []             # e.g. ["Keep replies under 3 sentences.", "Always respond in English."]

llm:
  provider: claude
  model: claude-sonnet-4-6
  baseUrl: https://api.anthropic.com

tts:
  modelPath: /Users/ayusman/hale/freeman/models/kokoro
  voice: bm_george
  speed: 1.0

stt:
  enabled: true
  provider: whisper
  modelPath: /Users/ayusman/hale/freeman/models/whisper-small

wakeword:
  enabled: false        # set true if you have OpenWakeWord models
  modelsDir: /path/to/wakeword/models
  threshold: 0.5

memory:
  enabled: true         # set false to run stateless (no SQLite)
  dbPath: ~/.freeman/memory.db
  historyWindow: 20     # recent turns kept in-context per session
  recallLimit: 5        # past turns retrieved from DB per query

tools:
  dirs: []

# Path to sherpa-onnx native libs — used by run.sh to set -Djava.library.path
# Download: https://github.com/k2-fsa/sherpa-onnx/releases (pick the JVM package for your OS)
libsPath: /Users/ayusman/hale/freeman/macos/libs
