persona:
  name: Freeman
  greeting: "Hey, I'm Freeman. What can I do for you?"
  farewell: "Catch you later."

llm:
  provider: ollama          # ollama | claude
  model: gemma4:e4b         # ollama model name  — or claude-sonnet-4-6 / claude-opus-4-7
  baseUrl: http://localhost:11434
  numCtx: 8192              # ollama: context window size (tokens)
  keepAlive: "-1"           # ollama: keep model loaded forever (-1 = never unload)
  # apiKey: sk-ant-...      # claude: or set ANTHROPIC_API_KEY env var

tts:
  modelPath: ./models/kokoro
  voice: bm_george
  speed: 1.0

stt:
  enabled: true
  modelPath: ./models/moonshine

wakeword:
  modelsDir: ./models/wakeword
  threshold: 0.5

tools:
  dirs:
    - ./tools

memory:
  historyWindow: 20   # recent turns kept in-context per session
  recallLimit: 5      # past turns retrieved from SQLite per query
